# Curated model list: the input to the dataset generation script.
# One model per entry, block style: one field per line.
# models whose file already exists are skipped, so editing this list and
# re-running the script only generates what is missing.
#
# price    — approximate India launch price in INR; plausible, not certified.
# segment  — budget <10k | lower-mid 10-20k | mid 20-35k | upper-mid 35-60k
#            | flagship 60k-1L | ultra >1L
# personas — demo personas this model should match strongly:
#            elderly | teen | camera-lover | gamer | value-seeker

